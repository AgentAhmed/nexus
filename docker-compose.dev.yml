version: "3.9"

# Local dev: docker compose -f docker-compose.dev.yml up
# API at :8000, Frontend at :3000, Phoenix at :6006

services:

  api:
    build: { context: ., dockerfile: deploy/Dockerfile.api }
    ports: ["8000:8000"]
    env_file: .env
    environment:
      - CHROMA_PATH=/app/chroma_db
      - ENABLE_PHOENIX=false   # run Phoenix separately for dev
    volumes:
      - ./backend:/app/backend   # hot reload
      - chroma_data:/app/chroma_db
    depends_on: [redis]
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  chroma_data:
