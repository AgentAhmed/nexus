version: "3.9"

# ============================================================
# NEXUS — Full Stack Docker Compose
# Deploy: docker compose up -d
# Dev:    docker compose -f docker-compose.dev.yml up
# ============================================================

services:

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VULTR_API_KEY=${VULTR_API_KEY:-}
      - FEATHERLESS_API_KEY=${FEATHERLESS_API_KEY:-}
      - SPEECHMATICS_API_KEY=${SPEECHMATICS_API_KEY:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - JIRA_BASE_URL=${JIRA_BASE_URL:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - JIRA_USER_EMAIL=${JIRA_USER_EMAIL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CHROMA_PATH=/app/chroma_db
      - REDIS_URL=redis://redis:6379
      - ENABLE_PHOENIX=${ENABLE_PHOENIX:-true}
      - PHOENIX_PORT=6006
      - FRONTEND_URL=http://frontend:3000
    volumes:
      - chroma_data:/app/chroma_db
    depends_on:
      - redis
      - phoenix
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost/api}
        - NEXT_PUBLIC_WS_URL=${PUBLIC_WS_URL:-ws://localhost/ws}
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend

  phoenix:
    image: arizephoenix/phoenix:latest
    restart: unless-stopped
    ports:
      - "6006:6006"
    volumes:
      - phoenix_data:/app/storage

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  chroma_data:
  phoenix_data:
  redis_data:
