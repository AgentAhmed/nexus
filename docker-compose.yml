version: "3.9"
# NEXUS — Production Docker Compose
# Works on AWS EC2, DigitalOcean, any VPS
# Run: docker compose up -d

services:

  api:
    build: { context: ., dockerfile: deploy/Dockerfile.api }
    restart: unless-stopped
    env_file: .env
    environment:
      - CHROMA_PATH=/app/chroma_db
    volumes:
      - chroma_data:/app/chroma_db
    depends_on: [redis]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s; timeout: 10s; retries: 3

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=${PUBLIC_URL:-http://localhost}/api
        - NEXT_PUBLIC_WS_URL=${PUBLIC_URL:-ws://localhost}/ws
    restart: unless-stopped
    depends_on: [api]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [api, frontend]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes: [redis_data:/data]

volumes:
  chroma_data:
  redis_data:
