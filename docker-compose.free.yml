version: "3.9"
# NEXUS — Free/lightweight compose
# Optimised for AWS t2.micro (1GB RAM) or Railway/Render free tier
# No nginx, no Redis, no Phoenix — just API + frontend
# Run: docker compose -f docker-compose.free.yml up -d

services:

  api:
    build: { context: ., dockerfile: deploy/Dockerfile.api }
    restart: unless-stopped
    ports: ["8000:8000"]
    env_file: .env
    environment:
      - CHROMA_PATH=/app/chroma_db
      - ENABLE_PHOENIX=false
      - REDIS_URL=               # no Redis, uses in-memory
    volumes:
      - chroma_data:/app/chroma_db
    # Limit RAM to fit t2.micro
    deploy:
      resources:
        limits:
          memory: 700M

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
        - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    restart: unless-stopped
    ports: ["3000:3000"]
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  chroma_data:
